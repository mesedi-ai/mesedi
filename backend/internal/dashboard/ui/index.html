<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mesedi — Local Dev</title>
  <style>
    :root {
      --bg:           #0f172a;
      --surface:      #1e293b;
      --surface-2:    #334155;
      --surface-3:    #475569;
      --border:       #334155;
      --border-2:     #475569;
      --text:         #f1f5f9;
      --text-muted:   #94a3b8;
      --text-dim:     #64748b;
      --accent:       #c9a646;
      --danger:       #ef4444;
      --danger-bg:    rgba(239, 68, 68, 0.15);
      --danger-border:rgba(239, 68, 68, 0.35);
      --warning:      #f59e0b;
      --warning-bg:   rgba(245, 158, 11, 0.15);
      --warning-border:rgba(245, 158, 11, 0.35);
      --success:      #10b981;
      --success-bg:   rgba(16, 185, 129, 0.15);
      --success-border:rgba(16, 185, 129, 0.35);
      --info:         #60a5fa;
      --info-bg:      rgba(96, 165, 250, 0.15);
      --info-border:  rgba(96, 165, 250, 0.35);
      --purple:       #a78bfa;
      --purple-bg:    rgba(167, 139, 250, 0.15);
      --purple-border:rgba(167, 139, 250, 0.35);
      --teal:         #14b8a6;
      --teal-bg:      rgba(20, 184, 166, 0.15);
      --teal-border:  rgba(20, 184, 166, 0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; border-bottom: 0.5px solid var(--border);
      background: var(--surface);
    }
    .brand { display: flex; align-items: center; gap: 24px; }
    .brand-name { font-size: 17px; font-weight: 500; letter-spacing: -0.2px; }
    .project-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px;
      border: 0.5px solid var(--border-2);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .dev-badge {
      font-size: 10px; padding: 3px 7px;
      background: var(--warning-bg); color: var(--warning);
      border: 0.5px solid var(--warning-border);
      border-radius: 4px; font-weight: 500; letter-spacing: 0.5px;
    }
    .nav-link {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 5px;
    }
    .nav-link:hover { color: var(--text); background: var(--surface-2); }

    /* Settings page-specific bits */
    .key-revealed {
      padding: 14px 16px;
      background: var(--success-bg);
      border: 0.5px solid var(--success-border);
      border-radius: 8px;
      margin-bottom: 18px;
    }
    .key-revealed .label {
      font-size: 11px;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .key-revealed .value {
      font-family: "SF Mono", Menlo, monospace;
      font-size: 13px;
      padding: 8px 10px;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      word-break: break-all;
      user-select: all;
    }
    .key-revealed .warn {
      font-size: 11px;
      color: var(--warning);
      margin-top: 8px;
    }
    .mint-form {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
    }
    .mint-form input {
      flex: 1;
      padding: 8px 12px;
      background: var(--surface);
      border: 0.5px solid var(--border-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }
    .mint-form input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .mint-form button {
      padding: 8px 14px;
      background: var(--accent);
      border: 0.5px solid var(--accent);
      color: var(--bg);
      border-radius: 6px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .mint-form button:hover { opacity: 0.9; }
    .mint-form button:active { transform: translateY(1px); }
    .revoke-btn {
      padding: 4px 10px;
      background: transparent;
      border: 0.5px solid var(--danger-border);
      color: var(--danger);
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .revoke-btn:hover { background: var(--danger-bg); }
    main { padding: 28px; max-width: 1280px; margin: 0 auto; }

    .page-head {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 24px;
    }
    h1 { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text-muted); }
    .back-link {
      display: inline-block;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .back-link:hover { color: var(--text); }
    .reload-btn {
      padding: 7px 14px;
      background: var(--surface);
      border: 0.5px solid var(--border-2);
      color: var(--text);
      border-radius: 6px;
      font-size: 13px; font-family: inherit;
      cursor: pointer;
    }
    .reload-btn:hover { background: var(--surface-2); border-color: var(--surface-3); }
    .reload-btn:active { transform: translateY(1px); }

    /* Operator-action row above an execution's metadata. Only rendered
     * when the execution is still running (status === "started"); the
     * Halt button POSTs /executions/{id}/halt to push a halt event via
     * the SSE channel the SDK is subscribed to. */
    .exec-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .halt-btn {
      padding: 8px 18px;
      background: var(--danger-bg);
      border: 0.5px solid var(--danger-border);
      color: var(--danger);
      border-radius: 6px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .halt-btn:hover { background: var(--danger); color: var(--bg); }
    .halt-btn:active { transform: translateY(1px); }
    .halt-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .stat-label {
      font-size: 12px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: 28px; font-weight: 500;
      font-variant-numeric: tabular-nums;
      margin-top: 4px;
    }
    .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    .stat-sub.bad { color: var(--danger); }
    .stat-sub.good { color: var(--success); }

    .section { margin-bottom: 36px; }
    .section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title { font-size: 16px; font-weight: 500; }
    .section-title .count {
      font-weight: 400; color: var(--text-muted);
      font-size: 14px; margin-left: 8px;
    }
    .section-desc {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    thead tr { background: var(--surface-2); }
    th {
      text-align: left; padding: 10px 14px;
      font-size: 11px; font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    td {
      padding: 11px 14px;
      font-size: 13px;
      border-top: 0.5px solid var(--border);
    }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover td { background: var(--surface-2); }
    td.mono {
      font-family: "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
    .num { font-variant-numeric: tabular-nums; text-align: right; }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      font-size: 11px; font-weight: 500;
      border-radius: 4px;
      border: 0.5px solid transparent;
      text-transform: capitalize;
    }
    .badge-crash      { background: var(--danger-bg);  color: var(--danger);  border-color: var(--danger-border); }
    .badge-loop       { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }
    .badge-tool       { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }
    .badge-validator  { background: var(--info-bg);    color: var(--info);    border-color: var(--info-border); }
    .badge-injection  { background: var(--purple-bg);  color: var(--purple);  border-color: var(--purple-border); }
    .badge-drift      { background: var(--teal-bg);    color: var(--teal);    border-color: var(--teal-border); }
    .badge-cost       { background: rgba(201, 166, 70, 0.15); color: var(--accent); border-color: rgba(201, 166, 70, 0.35); }
    .badge-default    { background: var(--surface-2);  color: var(--text-muted); }
    .status-started   { background: var(--info-bg);    color: var(--info);    border-color: var(--info-border); }
    .status-completed { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
    .status-crashed   { background: var(--danger-bg);  color: var(--danger);  border-color: var(--danger-border); }
    .status-halted    { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }
    .status-timeout   { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }
    .status-validation_failed { background: var(--danger-bg); color: var(--danger); border-color: var(--danger-border); }

    .evt-llm_call         { background: var(--purple-bg);  color: var(--purple);  border-color: var(--purple-border); }
    .evt-tool_call        { background: var(--info-bg);    color: var(--info);    border-color: var(--info-border); }
    .evt-checkpoint       { background: var(--surface-2);  color: var(--text-muted); }
    .evt-validator_result { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
    .evt-exception        { background: var(--danger-bg);  color: var(--danger);  border-color: var(--danger-border); }
    .evt-drift_signal     { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }
    .evt-injection_alert  { background: var(--danger-bg);  color: var(--danger);  border-color: var(--danger-border); }

    .empty {
      padding: 60px 24px;
      text-align: center; color: var(--text-muted); font-size: 14px;
    }
    .empty strong { color: var(--text); font-weight: 500; }
    .empty code {
      display: inline-block; margin-top: 8px;
      font-size: 12px; color: var(--accent);
      background: var(--surface); padding: 4px 8px;
      border-radius: 4px;
      border: 0.5px solid var(--border);
    }
    .error {
      padding: 18px 22px;
      background: var(--danger-bg);
      color: var(--text);
      border: 0.5px solid var(--danger-border);
      border-radius: 8px;
      font-family: "SF Mono", monospace;
      font-size: 12px;
      margin-bottom: 24px;
    }

    /* Detail-view styles */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }
    .meta-cell .meta-label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .meta-cell .meta-value {
      font-size: 15px; margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    .meta-cell .meta-value.mono {
      font-family: "SF Mono", Menlo, monospace; font-size: 13px;
      color: var(--text-muted);
    }
    details.payload {
      margin-top: 4px;
    }
    details.payload summary {
      cursor: pointer; font-size: 11px; color: var(--text-muted);
      list-style: none;
    }
    details.payload summary::-webkit-details-marker { display: none; }
    details.payload summary:before {
      content: "▸"; display: inline-block;
      width: 12px; transition: transform 0.1s;
      color: var(--text-dim);
    }
    details.payload[open] summary:before { transform: rotate(90deg); }
    details.payload pre {
      margin-top: 6px;
      padding: 10px 12px;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 240px;
      overflow-y: auto;
    }

    footer {
      margin-top: 60px;
      padding: 24px 28px;
      border-top: 0.5px solid var(--border);
      text-align: center;
      font-size: 11px; color: var(--text-dim);
    }

    /* ── Filter bar (failure-groups list controls) ───────────────────── */
    .filter-bar {
      display: flex; gap: 16px; align-items: center;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .filter-group {
      display: flex; gap: 4px; align-items: center;
    }
    .filter-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-right: 6px;
    }
    .filter-chip {
      padding: 5px 11px;
      font-size: 12px;
      background: transparent;
      border: 0.5px solid var(--border-2);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }
    .filter-chip:hover { background: var(--surface-2); color: var(--text); }
    .filter-chip.active {
      background: var(--surface-2);
      color: var(--text);
      border-color: var(--surface-3);
    }
    .filter-bar-spacer { flex: 1; }

    /* ── Collapsible class-group cards ───────────────────────────────── */
    .class-group {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .class-group-head {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
    }
    .class-group-head:hover { background: var(--surface-2); }
    .class-group-caret {
      font-size: 11px; color: var(--text-dim);
      transition: transform 0.1s;
      display: inline-block; width: 12px;
    }
    .class-group.open .class-group-caret { transform: rotate(90deg); }
    .class-group-title {
      flex: 1;
      display: flex; align-items: center; gap: 12px;
    }
    .class-group-title .badge { font-size: 11px; }
    .class-group-stats {
      display: flex; gap: 22px; align-items: center;
      font-size: 12px; color: var(--text-muted);
    }
    .class-group-stat {
      display: flex; gap: 5px; align-items: baseline;
    }
    .class-group-stat-value {
      font-weight: 500; color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .class-group-stat-value.cost { color: var(--accent); }
    .class-group-body {
      display: none;
      border-top: 0.5px solid var(--border);
    }
    .class-group.open .class-group-body { display: block; }
    .class-group-body table {
      border: none;
      border-radius: 0;
      background: transparent;
    }
    .class-group-body thead tr { background: transparent; }
    .class-group-body td:first-child,
    .class-group-body th:first-child { padding-left: 18px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-name">Mesedi</span>
      <span class="project-chip">
        <span>Local Dev</span>
        <span style="color: var(--text-dim);">·</span>
        <span style="font-family: monospace; font-size: 12px;">proj-dev</span>
      </span>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
      <a class="nav-link" onclick="showOverview()">Overview</a>
      <a class="nav-link" onclick="showSettings()">Settings</a>
      <span class="dev-badge">DEV ONLY · LOCALHOST</span>
    </div>
  </header>
  <main id="main"></main>
  <footer>
    Mesedi local-dev dashboard prototype · Phase 3b sub-slice 8 · served from the backend binary at /ui/
  </footer>

  <script>
    const DEV_KEY = "mesedi_sk_dev_local_only";
    const HEADERS = {
      "Authorization": "Bearer " + DEV_KEY,
      "X-Mesedi-Schema-Version": "1",
    };

    // ── helpers ────────────────────────────────────────────────────────
    function fmtNum(n) { return new Intl.NumberFormat("en-US").format(n); }
    function fmtDate(s) {
      if (!s) return "—";
      const d = new Date(s);
      const diffMs = new Date() - d;
      const diffMin = Math.round(diffMs / 60000);
      if (diffMin < 1) return "just now";
      if (diffMin < 60) return diffMin + "m ago";
      const diffHr = Math.round(diffMin / 60);
      if (diffHr < 24) return diffHr + "h ago";
      const diffDays = Math.round(diffHr / 24);
      return diffDays + "d ago";
    }
    function fmtDateExact(s) {
      if (!s) return "—";
      return new Date(s).toLocaleString();
    }
    function fmtDuration(ms) {
      if (ms === null || ms === undefined || ms === 0) return "—";
      if (ms < 1000) return ms + "ms";
      return (ms / 1000).toFixed(1) + "s";
    }
    function badgeForClass(cls) {
      switch (cls) {
        case "crashes":            return "badge-crash";
        case "loops":              return "badge-loop";
        case "tool_failures":      return "badge-tool";
        case "validator_failures": return "badge-validator";
        case "prompt_injection":   return "badge-injection";
        case "drift":              return "badge-drift";
        case "cost_velocity":      return "badge-cost";
        default:                   return "badge-default";
      }
    }
    function badgeForStatus(status) { return "status-" + (status || "default"); }
    function escapeHtml(s) {
      if (s === null || s === undefined) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function fetchJSON(path) {
      const r = await fetch(path, { headers: HEADERS });
      if (!r.ok) throw new Error("HTTP " + r.status + " from " + path);
      return r.json();
    }

    // ── OVERVIEW VIEW ──────────────────────────────────────────────────

    async function showOverview() {
      const main = document.getElementById("main");
      main.innerHTML = `
        <div class="page-head">
          <div>
            <h1>Overview</h1>
            <div class="subtitle" id="last-refresh">Loading…</div>
          </div>
          <button class="reload-btn" onclick="showOverview()">↻ Reload</button>
        </div>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-label">Total executions</div><div class="stat-value" id="stat-total">—</div><div class="stat-sub">all time</div></div>
          <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" id="stat-completed">—</div><div class="stat-sub">all time</div></div>
          <div class="stat-card"><div class="stat-label">Crashed · 24h</div><div class="stat-value" id="stat-crashed">—</div><div class="stat-sub" id="stat-crashed-sub">last 24 hours</div></div>
          <div class="stat-card"><div class="stat-label">Open failure groups</div><div class="stat-value" id="stat-groups">—</div><div class="stat-sub">grouped signatures</div></div>
        </div>
        <div class="section">
          <div class="section-head"><div class="section-title">Failure groups<span class="count" id="groups-count"></span></div></div>
          <div class="section-desc">Failure signatures clustered by class. Click a class to expand the signatures inside. Within each class, ranking sorts by <em>cost wasted × affected executions</em> by default.</div>
          <div id="groups-content"></div>
        </div>
        <div class="section">
          <div class="section-head"><div class="section-title">Recent executions<span class="count" id="execs-count"></span></div></div>
          <div class="section-desc">Most recent agent executions, newest first. Click a row to see its event timeline.</div>
          <div id="execs-content"></div>
        </div>
      `;

      try {
        const [stats, groupsResp, execsResp] = await Promise.all([
          fetchJSON("/stats"),
          fetchJSON("/failure-groups"),
          fetchJSON("/executions?limit=50"),
        ]);
        renderStats(stats);
        renderGroups(groupsResp.failure_groups || []);
        renderExecsTable(execsResp.executions || []);
        document.getElementById("last-refresh").textContent =
          "Last refresh: " + new Date().toLocaleTimeString();
      } catch (e) {
        main.insertAdjacentHTML("afterbegin",
          '<div class="error">Fetch failed: ' + e.message + '<br>Is the backend running?</div>');
      }
    }

    function renderStats(s) {
      document.getElementById("stat-total").textContent = fmtNum(s.total_executions || 0);
      document.getElementById("stat-completed").textContent = fmtNum(s.completed_executions || 0);
      const crashed = s.crashed_24h || 0;
      document.getElementById("stat-crashed").textContent = fmtNum(crashed);
      document.getElementById("stat-crashed-sub").classList.toggle("bad", crashed > 0);
      document.getElementById("stat-groups").textContent = fmtNum(s.open_failure_groups || 0);
    }

    // ── Failure-groups view: filter + sort + collapse-by-class ──────────
    //
    // Severity rank: lower number = surface higher in the list.
    // Crashes first (always actionable), then security (injection), then
    // money (cost_velocity), then operational classes.
    const FAILURE_CLASS_RANK = {
      "crashes":            1,
      "prompt_injection":   2,
      "drift":              3,
      "cost_velocity":      4,
      "loops":              5,
      "tool_failures":      6,
      "validator_failures": 7,
    };

    const TIME_WINDOWS = {
      "all": { label: "All time",     ms: Infinity },
      "7d":  { label: "Last 7 days",  ms: 7 * 24 * 3600 * 1000 },
      "24h": { label: "Last 24h",     ms: 24 * 3600 * 1000 },
    };

    const SORT_MODES = {
      "severity": { label: "Severity" },
      "recent":   { label: "Most recent" },
      "frequent": { label: "Most frequent" },
    };

    const DEFAULT_PREFS = {
      window:   "all",
      sort:     "severity",
      expanded: {},
    };

    function loadPrefs() {
      try {
        const raw = localStorage.getItem("mesedi.dashboard.prefs");
        if (!raw) return JSON.parse(JSON.stringify(DEFAULT_PREFS));
        const parsed = JSON.parse(raw);
        return Object.assign({}, DEFAULT_PREFS, parsed,
          { expanded: Object.assign({}, parsed.expanded || {}) });
      } catch (e) {
        return JSON.parse(JSON.stringify(DEFAULT_PREFS));
      }
    }

    function savePrefs(prefs) {
      try { localStorage.setItem("mesedi.dashboard.prefs", JSON.stringify(prefs)); }
      catch (e) { /* private browsing or quota — silently degrade */ }
    }

    let _prefs = loadPrefs();
    let _lastGroups = null;  // cached so filter toggles can re-render without re-fetch

    function setPref(key, value) {
      _prefs[key] = value;
      savePrefs(_prefs);
      if (_lastGroups) renderGroups(_lastGroups);
    }

    function toggleClassExpand(cls) {
      _prefs.expanded = _prefs.expanded || {};
      _prefs.expanded[cls] = !_prefs.expanded[cls];
      savePrefs(_prefs);
      if (_lastGroups) renderGroups(_lastGroups);
    }

    function toggleAllExpand() {
      const groups = _lastGroups || [];
      const classes = Array.from(new Set(groups.map(g => g.failure_class)));
      const anyOpen = classes.some(c => _prefs.expanded && _prefs.expanded[c]);
      _prefs.expanded = {};
      if (!anyOpen) classes.forEach(c => { _prefs.expanded[c] = true; });
      savePrefs(_prefs);
      renderGroups(groups);
    }

    function filterGroupsByWindow(groups) {
      const w = TIME_WINDOWS[_prefs.window] || TIME_WINDOWS.all;
      if (!isFinite(w.ms)) return groups;
      const cutoff = Date.now() - w.ms;
      return groups.filter(g => {
        if (!g.last_seen) return false;
        const ts = new Date(g.last_seen).getTime();
        return ts >= cutoff;
      });
    }

    function severityScore(g) {
      // cost × affected. groups with $0 cost still rank by affected count.
      return (g.cost_wasted_usd || 0) * (g.affected_executions || 0)
        + (g.affected_executions || 0) * 0.0000001;
    }

    function sortGroupsWithin(groups) {
      const mode = _prefs.sort || "severity";
      const sortFns = {
        severity: (a, b) => severityScore(b) - severityScore(a),
        recent:   (a, b) => new Date(b.last_seen || 0).getTime()
                          - new Date(a.last_seen || 0).getTime(),
        frequent: (a, b) => (b.affected_executions || 0) - (a.affected_executions || 0),
      };
      return groups.slice().sort(sortFns[mode] || sortFns.severity);
    }

    function renderFilterBar(visibleCount, totalCount) {
      const windowChips = Object.keys(TIME_WINDOWS).map(k => {
        const active = _prefs.window === k ? ' active' : '';
        return '<button class="filter-chip' + active + '" onclick="setPref(\'window\', \''
          + k + '\')">' + escapeHtml(TIME_WINDOWS[k].label) + '</button>';
      }).join('');

      const sortChips = Object.keys(SORT_MODES).map(k => {
        const active = _prefs.sort === k ? ' active' : '';
        return '<button class="filter-chip' + active + '" onclick="setPref(\'sort\', \''
          + k + '\')">' + escapeHtml(SORT_MODES[k].label) + '</button>';
      }).join('');

      return '<div class="filter-bar">' +
        '<div class="filter-group"><span class="filter-label">Window</span>' + windowChips + '</div>' +
        '<div class="filter-group"><span class="filter-label">Sort</span>' + sortChips + '</div>' +
        '<div class="filter-bar-spacer"></div>' +
        '<button class="filter-chip" onclick="toggleAllExpand()">Expand / collapse all</button>' +
      '</div>';
    }

    function renderGroups(groups) {
      _lastGroups = groups;
      const c = document.getElementById("groups-content");
      const countEl = document.getElementById("groups-count");
      const totalCount = groups.length;
      const filtered = filterGroupsByWindow(groups);

      if (countEl) {
        countEl.textContent = totalCount === filtered.length
          ? " (" + totalCount + ")"
          : " (" + filtered.length + " of " + totalCount + " · " + (TIME_WINDOWS[_prefs.window] || TIME_WINDOWS.all).label + ")";
      }

      if (totalCount === 0) {
        c.innerHTML = renderFilterBar(0, 0) +
          '<div class="empty"><strong>No failure groups yet.</strong><br>Run some agents against the backend to populate this view.</div>';
        return;
      }
      if (filtered.length === 0) {
        c.innerHTML = renderFilterBar(0, totalCount) +
          '<div class="empty"><strong>No failure groups in this window.</strong><br>Try the "All time" filter to see older groups.</div>';
        return;
      }

      // Bucket by class.
      const byClass = {};
      filtered.forEach(g => {
        const cls = g.failure_class || "unknown";
        (byClass[cls] = byClass[cls] || []).push(g);
      });

      // Order classes by rank (unknown classes go last).
      const classNames = Object.keys(byClass).sort((a, b) => {
        const ra = FAILURE_CLASS_RANK[a] || 99;
        const rb = FAILURE_CLASS_RANK[b] || 99;
        if (ra !== rb) return ra - rb;
        return a.localeCompare(b);
      });

      const cards = classNames.map(cls => {
        const groupsInCls = sortGroupsWithin(byClass[cls]);
        const totalAffected = groupsInCls.reduce((s, g) => s + (g.affected_executions || 0), 0);
        const totalCost     = groupsInCls.reduce((s, g) => s + (g.cost_wasted_usd || 0), 0);
        const groupCount    = groupsInCls.length;
        const expanded      = !!(_prefs.expanded && _prefs.expanded[cls]);

        const rows = groupsInCls.map(g =>
          '<tr class="clickable" onclick="showFailureGroupDetail(\'' + escapeHtml(g.group_id) + '\')">' +
            '<td class="mono">' + escapeHtml(g.signature) + '</td>' +
            '<td class="num">' + fmtNum(g.event_count) + '</td>' +
            '<td class="num">' + fmtNum(g.affected_executions) + '</td>' +
            '<td class="num">' + (g.cost_wasted_usd ? '$' + g.cost_wasted_usd.toFixed(4) : '—') + '</td>' +
            '<td>' + fmtDate(g.first_seen) + '</td>' +
            '<td>' + fmtDate(g.last_seen) + '</td>' +
          '</tr>').join('');

        return '<div class="class-group' + (expanded ? ' open' : '') + '">' +
          '<div class="class-group-head" onclick="toggleClassExpand(\'' + escapeHtml(cls) + '\')">' +
            '<span class="class-group-caret">▸</span>' +
            '<div class="class-group-title">' +
              '<span class="badge ' + badgeForClass(cls) + '">' + escapeHtml(cls) + '</span>' +
            '</div>' +
            '<div class="class-group-stats">' +
              '<span class="class-group-stat"><span class="class-group-stat-value">' + fmtNum(groupCount) + '</span> ' +
                (groupCount === 1 ? 'group' : 'groups') + '</span>' +
              '<span class="class-group-stat"><span class="class-group-stat-value">' + fmtNum(totalAffected) + '</span> affected</span>' +
              '<span class="class-group-stat"><span class="class-group-stat-value cost">$' + totalCost.toFixed(4) + '</span> wasted</span>' +
            '</div>' +
          '</div>' +
          '<div class="class-group-body">' +
            '<table><thead><tr>' +
              '<th>Signature</th>' +
              '<th class="num">Events</th>' +
              '<th class="num">Affected</th>' +
              '<th class="num">Cost wasted</th>' +
              '<th>First seen</th>' +
              '<th>Last seen</th>' +
            '</tr></thead><tbody>' + rows + '</tbody></table>' +
          '</div>' +
        '</div>';
      }).join('');

      c.innerHTML = renderFilterBar(filtered.length, totalCount) + cards;
    }

    function renderExecsTable(execs) {
      const c = document.getElementById("execs-content");
      document.getElementById("execs-count").textContent = " (" + execs.length + ")";
      if (execs.length === 0) {
        c.innerHTML = '<div class="empty"><strong>No executions yet.</strong></div>';
        return;
      }
      const rows = execs.map(e =>
        '<tr class="clickable" onclick="showExecutionDetail(\'' + escapeHtml(e.execution_id) + '\')">' +
          '<td class="mono">' + escapeHtml(e.execution_id) + '</td>' +
          '<td><span class="badge ' + badgeForStatus(e.status) + '">' + escapeHtml(e.status) + '</span></td>' +
          '<td class="num">' + fmtDuration(e.duration_ms) + '</td>' +
          '<td>' + escapeHtml(e.sdk_language || "—") + '</td>' +
          '<td class="mono">' + escapeHtml(e.crash_signature || "—") + '</td>' +
          '<td>' + fmtDate(e.started_at) + '</td>' +
        '</tr>').join("");
      c.innerHTML = '<table><thead><tr>' +
        '<th>Execution</th><th>Status</th>' +
        '<th class="num">Duration</th>' +
        '<th>SDK</th><th>Crash signature</th><th>Started</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>';
    }

    // ── EXECUTION DETAIL VIEW ──────────────────────────────────────────

    async function showExecutionDetail(executionID) {
      const main = document.getElementById("main");
      main.innerHTML = `
        <a class="back-link" onclick="showOverview()">← Overview</a>
        <div class="page-head">
          <div>
            <h1>Execution detail</h1>
            <div class="subtitle mono" id="exec-id">${escapeHtml(executionID)}</div>
          </div>
          <button class="reload-btn" onclick="showExecutionDetail('${escapeHtml(executionID)}')">↻ Reload</button>
        </div>
        <div id="detail-content"><div class="empty">Loading…</div></div>
      `;
      try {
        const data = await fetchJSON("/executions/" + encodeURIComponent(executionID));
        renderExecutionDetail(data.execution, data.events || []);
      } catch (e) {
        document.getElementById("detail-content").innerHTML =
          '<div class="error">Fetch failed: ' + e.message + '</div>';
      }
    }

    function renderExecutionDetail(exec, events) {
      const c = document.getElementById("detail-content");

      // Operator Halt action — only visible while the execution is
      // still running. POSTs to /executions/{id}/halt which pushes a
      // halt event over the SSE channel the SDK is subscribed to.
      // The agent halts at the next safe boundary (tool entry, LLM
      // call entry, checkpoint), runs its try/finally cleanup, and
      // PATCHes the execution to status=halted.
      const haltAction = exec.status === "started"
        ? '<div class="exec-actions">' +
            '<button class="halt-btn" ' +
              'onclick="haltExecution(\'' + escapeHtml(exec.execution_id) + '\', this)">' +
              '⛔ Halt this execution' +
            '</button>' +
          '</div>'
        : "";

      const meta = `
        ${haltAction}
        <div class="meta-grid">
          <div class="meta-cell">
            <div class="meta-label">Status</div>
            <div class="meta-value"><span class="badge ${badgeForStatus(exec.status)}">${escapeHtml(exec.status)}</span></div>
          </div>
          <div class="meta-cell">
            <div class="meta-label">Duration</div>
            <div class="meta-value">${fmtDuration(exec.duration_ms)}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label">SDK</div>
            <div class="meta-value">${escapeHtml(exec.sdk_language || "—")} ${escapeHtml(exec.sdk_version || "")}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label">Crash signature</div>
            <div class="meta-value mono">${escapeHtml(exec.crash_signature || "—")}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label">Started</div>
            <div class="meta-value">${fmtDateExact(exec.started_at)}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label">Ended</div>
            <div class="meta-value">${fmtDateExact(exec.ended_at)}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label">Tokens in / out</div>
            <div class="meta-value">${fmtNum(exec.total_tokens_in || 0)} / ${fmtNum(exec.total_tokens_out || 0)}</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label">Estimated cost</div>
            <div class="meta-value">${exec.estimated_cost_usd ? '$' + exec.estimated_cost_usd.toFixed(4) : "—"}</div>
          </div>
        </div>
      `;

      const eventsSection = `
        <div class="section">
          <div class="section-head"><div class="section-title">Event timeline<span class="count"> (${events.length})</span></div></div>
          <div class="section-desc">Events recorded against this execution, in sequence order. Click ▸ to expand each event's payload.</div>
          ${events.length === 0
            ? '<div class="empty"><strong>No events recorded.</strong><br>This execution started + ended without emitting any tool/LLM/checkpoint events.</div>'
            : renderEventsTimeline(events)
          }
        </div>
      `;

      c.innerHTML = meta + eventsSection;
    }

    function renderEventsTimeline(events) {
      const rows = events.map(e => {
        const summary = eventSummary(e);
        const payloadJSON = e.payload
          ? JSON.stringify(e.payload, null, 2)
          : "(no payload)";
        return `
          <tr>
            <td class="num">${e.sequence}</td>
            <td><span class="badge evt-${e.event_type}">${escapeHtml(e.event_type)}</span></td>
            <td>${escapeHtml(summary)}
              <details class="payload">
                <summary>payload</summary>
                <pre>${escapeHtml(payloadJSON)}</pre>
              </details>
            </td>
            <td class="num">${fmtDuration(e.duration_ms)}</td>
            <td>${fmtDateExact(e.timestamp)}</td>
          </tr>
        `;
      }).join("");
      return `<table><thead><tr>
        <th class="num">#</th><th>Event</th><th>Summary</th>
        <th class="num">Duration</th><th>Time</th>
      </tr></thead><tbody>${rows}</tbody></table>`;
    }

    // Operator-triggered halt — POST /executions/{id}/halt to the
    // backend, which fans the halt event out over SSE to whatever
    // SDK process is subscribed for this execution. The agent stops
    // at the next safe boundary; the dashboard reloads the execution
    // detail shortly after so the operator sees the new status=halted
    // state.
    //
    // Three response paths to handle:
    //   200 + {notified: N}   — N>=1 SDK subscriber received the halt.
    //                           Tell the operator, reload the detail.
    //   404 + {error: "no active halt-stream subscribers..."}
    //                         — execution has no live SDK listener
    //                           (probably already terminal, or the
    //                           agent wasn't budgeted so it never
    //                           subscribed). Tell the operator —
    //                           still a useful failure mode to know
    //                           about, not a bug.
    //   other                 — surface raw HTTP status + body for
    //                           debugging.
    async function haltExecution(executionID, btn) {
      if (!confirm(
        "Halt this execution?\n\n" +
        "The SDK will be signaled to stop at the next safe boundary " +
        "(next tool call, LLM call, or checkpoint). The agent's normal " +
        "try/finally cleanup will run; the execution will be recorded " +
        "as status=halted with crash_signature=halt:remote_signal."
      )) return;

      if (btn) {
        btn.disabled = true;
        btn.textContent = "Halting…";
      }

      try {
        const r = await fetch("/executions/" + encodeURIComponent(executionID) + "/halt", {
          method: "POST",
          headers: Object.assign({}, HEADERS, { "Content-Type": "application/json" }),
          body: JSON.stringify({ reason: "halted by operator from dashboard" }),
        });
        const text = await r.text();
        let body = null;
        try { body = JSON.parse(text); } catch { /* not JSON */ }

        if (r.ok && body && body.notified) {
          alert(
            "Halt delivered to " + body.notified + " SDK subscriber(s).\n\n" +
            "The execution will stop at its next safe boundary. " +
            "Reloading the detail page shortly to show the new status."
          );
          setTimeout(() => showExecutionDetail(executionID), 1500);
          return;
        }
        if (r.status === 404 && body && body.error) {
          alert(
            "Halt could not be delivered:\n\n" + body.error + "\n\n" +
            "This usually means the execution has no live SDK listener " +
            "(either it's already terminal, or the wrapped agent didn't " +
            "set a Budget so no halt-stream subscription was opened)."
          );
        } else {
          alert("Halt failed: HTTP " + r.status + "\n" + text);
        }
      } catch (err) {
        alert("Halt request failed: " + (err.message || String(err)));
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = "⛔ Halt this execution";
        }
      }
    }

    // Extract a short human-readable summary from event payload.
    // Different event types have different "identifying" fields.
    function eventSummary(e) {
      const p = e.payload || {};
      switch (e.event_type) {
        case "llm_call":
          return (p.model || "?") +
            (p.status === "failed" ? " (failed: " + (p.exception_type || "") + ")" : "") +
            (p.input_tokens !== undefined ? " · " + p.input_tokens + " in / " + p.output_tokens + " out" : "");
        case "tool_call":
          return (p.tool_name || "?") +
            (p.status === "failed" ? " (failed: " + (p.exception_type || "") + ")" : "");
        case "checkpoint":
          return p.name || "?";
        case "validator_result":
          return (p.name || "?") +
            (p.passed === false ? " (failed: " + (p.message || "") + ")" : " (passed)");
        case "exception":
          return p.exception_type || "?";
        default:
          return p.name || "—";
      }
    }

          '<td class="num">' + fmtDuration(e.duration_ms) + '</td>' +
          '<td>' + escapeHtml(e.sdk_language || "—") + '</td>' +
          '<td>' + fmtDate(e.started_at) + '</td>' +
        '</tr>').join("");
      return '<table><thead><tr>' +
        '<th>Execution</th><th>Status</th>' +

    async function refreshKeys() {
      const c = document.getElementById("keys-content");

        const data = await fetchJSON("/api-keys");
        const keys = data.api_keys || [];
        if (keys.length === 0) {
          c.innerHTML = '<div class="empty"><strong>No API keys yet.</strong><br>Mint one above.</div>';
          return;
        }
        const rows = keys.map(k =>
          '<tr>' +
            '<td class="mono">' + escapeHtml(k.key_prefix) + '…</td>' +
            '<td>' + escapeHtml(k.name || "—") + '</td>' +
            '<td>' + fmtDate(k.created_at) + '</td>' +
            '<td>' + (k.last_used_at ? fmtDate(k.last_used_at) : "never") + '</td>' +
            '<td><button class="revoke-btn" onclick="revokeKey(\'' + escapeHtml(k.key_id) + '\', \'' + escapeHtml(k.key_prefix) + '\')">Revoke</button></td>' +
          '</tr>'
        ).join("");
        c.innerHTML = '<table><thead><tr>' +
          '<th>Prefix</th><th>Label</th><th>Created</th><th>Last used</th><th></th>' +
          '</tr></thead><tbody>' + rows + '</tbody></table>';

        c.innerHTML = '<div class="error">Fetch failed: ' + e.message + '</div>';

    async function mintApiKey() {
      const nameEl = document.getElementById("mint-name");
      const name = nameEl.value.trim();
      try {
        const r = await fetch("/api-keys", {
          method: "POST",
          headers: {
            ...HEADERS,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ name }),
        });
        if (!r.ok) {
          const text = await r.text();
          throw new Error("HTTP " + r.status + ": " + text);
        }
        const data = await r.json();
        document.getElementById("mint-revealed").innerHTML = `
          <div class="key-revealed">
            <div class="label">New key minted — copy this NOW</div>
            <div class="value">${escapeHtml(data.raw_key)}</div>
            <div class="warn">⚠ ${escapeHtml(data.warning || "Store this raw_key now — it will never be shown again.")}</div>
          </div>
        `;
        nameEl.value = "";
        await refreshKeys();
      } catch (e) {
        document.getElementById("mint-revealed").innerHTML =
          '<div class="error">Mint failed: ' + escapeHtml(e.message) + '</div>';
      }
    }

    async function revokeKey(keyID, prefix) {
      if (!confirm(`Revoke key ${prefix}…? Any clients still using it will start getting 401.`)) {
        return;
      }
      try {
        const r = await fetch("/api-keys/" + encodeURIComponent(keyID), {
          method: "DELETE",
          headers: HEADERS,
        });
        if (!r.ok) {
          const text = await r.text();
          throw new Error("HTTP " + r.status + ": " + text);
        }
        await refreshKeys();
      } catch (e) {
        alert("Revoke failed: " + e.message);
      }
    }

    // ── BOOT ───────────────────────────────────────────────────────────
    showOverview();
  </script>
</body>
</html>
