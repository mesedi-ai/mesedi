<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mesedi simplified mark — vector placeholder.

  This SVG is a SIMPLIFIED geometric representation of the Mesedi brand
  mark, suitable for favicons, app icons, and any context requiring a
  scalable vector (HTML <link rel="icon">, PWA manifests, social-card
  fallbacks). It is NOT a faithful vectorization of the full rendered
  PNG (mesedi-logo.png) — the AI-rendered warrior figure, circuit-board
  detail, and embossed wordmark in the raster require either Adobe
  Illustrator image-trace + manual cleanup, or a vectorization service,
  to convert faithfully.

  For high-fidelity vector reproduction of the full logo, contract a
  designer (~$50-200 on Fiverr / 99designs / similar). This file is
  the meantime-stand-in.

  Color: gold (#C9A646) on transparent background.
  Viewport: 256x256 — scales cleanly to any size.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256"
     height="256">

  <!-- Shield outline — Mesedi mark silhouette, pentagonal with pointed bottom -->
  <path d="M 40 50
           L 216 50
           L 216 140
           Q 216 200, 128 230
           Q 40 200, 40 140
           Z"
        fill="none"
        stroke="#C9A646"
        stroke-width="6"
        stroke-linejoin="round"/>

  <!-- Vertical spear inside the shield (simplified — the central icon of the full mark) -->
  <line x1="128" y1="80"
        x2="128" y2="200"
        stroke="#C9A646"
        stroke-width="4"
        stroke-linecap="round"/>

  <!-- Spear tip (diamond) -->
  <path d="M 128 70
           L 138 85
           L 128 100
           L 118 85
           Z"
        fill="#C9A646"/>

  <!-- Spear shaft binding (small horizontal mark suggesting grip) -->
  <line x1="118" y1="140"
        x2="138" y2="140"
        stroke="#C9A646"
        stroke-width="2"/>

  <!-- Circuit-board trace hint on the shield's left interior (the brand's
       defining "ancient guardian + modern tech" fusion) -->
  <g stroke="#C9A646" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M 60 90 L 80 90 L 80 105 L 95 105"/>
    <path d="M 60 130 L 78 130"/>
    <path d="M 60 170 L 75 170 L 75 185"/>
    <circle cx="80" cy="90" r="2" fill="#C9A646"/>
    <circle cx="95" cy="105" r="2" fill="#C9A646"/>
    <circle cx="78" cy="130" r="2" fill="#C9A646"/>
    <circle cx="75" cy="185" r="2" fill="#C9A646"/>
  </g>
</svg>
