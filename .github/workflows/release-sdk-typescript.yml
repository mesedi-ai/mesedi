# Release workflow for the Mesedi TypeScript SDK.
#
# Triggers on a `sdk-typescript-v*` git tag push (monorepo convention so
# the TS SDK and the Python SDK can release independently). Verifies the
# type-check + build, then publishes to npm with provenance attestation
# via Trusted Publishing (OIDC), no NPM_TOKEN secret required.
#
# To cut a new release:
#
#   $EDITOR sdk-typescript/package.json         # bump version
#   git add sdk-typescript/package.json
#   git commit -m "Release sdk-typescript v0.1.1"
#   git tag -a sdk-typescript-v0.1.1 -m "Release sdk-typescript v0.1.1"
#   git push origin main sdk-typescript-v0.1.1
#
# Consumers update via:
#
#   npm install mesedi@latest
#
# Trusted Publishing prerequisite (one-time setup on npmjs.com):
#   1. Log in at https://www.npmjs.com/settings/<your-username>/packages
#   2. On the `mesedi` package page → Settings → Trusted Publishers
#   3. Add a GitHub Actions Trusted Publisher with:
#         Owner:            mesedi-ai
#         Repository:       mesedi
#         Workflow file:    .github/workflows/release-sdk-typescript.yml
#         Environment:      npm
#   4. For the *initial* publish, the package name must already exist , 
#      either do one manual `npm publish` from a local machine first to
#      claim `mesedi`, OR use npm's "pending publisher" flow.
#
# npm Trusted Publishing (OIDC) requires npm CLI v11.5.0 or newer.
# Node 20/22 LTS still ships with npm 10.x by default, which does not
# auto-detect Trusted Publisher config and falls back to no-auth publish
#, which the registry rejects with a misleading 404. The upgrade step
# below pulls the latest npm 11.x into the runner image before any
# publish work happens.

name: Release TypeScript SDK

on:
  push:
    tags:
      - "sdk-typescript-v*"

permissions:
  contents: write    # GitHub Release creation
  id-token: write    # npm provenance via Sigstore OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/mesedi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org/"

      - name: Upgrade npm to v11+ for Trusted Publishing
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        working-directory: sdk-typescript
        run: |
          tag="${GITHUB_REF##*/}"                          # sdk-typescript-v0.1.0
          tag_version="${tag#sdk-typescript-v}"            # 0.1.0
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag $tag (=> $tag_version) does not match package.json version $pkg_version"
            exit 1
          fi

      - name: Install
        working-directory: sdk-typescript
        run: npm install

      - name: Build
        working-directory: sdk-typescript
        run: npm run build

      - name: Publish to npm with provenance
        # Authentication is via npm Trusted Publishing (OIDC), no
        # NPM_TOKEN secret needed. The `id-token: write` permission at
        # the workflow level provides the Sigstore OIDC token; npm
        # validates the OIDC claims against the Trusted Publisher
        # config (org=mesedi-ai, repo=mesedi, workflow=release-sdk-
        # typescript.yml, environment=npm) before accepting the
        # publish. The same OIDC token also signs the provenance
        # artifact.
        working-directory: sdk-typescript
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
